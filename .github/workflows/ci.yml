# =============================================================================
# VelesDB Core - Continuous Integration Workflow (Optimized)
# =============================================================================
# Stratégie ultra-optimisée pour réduire les coûts GitHub Actions :
# - Jobs parallèles (lint, test, security en même temps)
# - Cache unifié et partagé entre jobs
# - Outils pré-compilés via taiki-e/install-action
# - Path filtering agressif
# - PR: validation minimale | main: coverage + benchmarks complets
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'sdks/typescript/**'
      - 'conformance/**'
      - 'benchmarks/**'
      - 'scripts/**'
      - 'docs/reference/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
  # PR désactivées pour économiser les minutes GitHub Actions
  # Validation locale OBLIGATOIRE avant push: exécuter /local-ci
  # pull_request:
  #   branches: [main, develop]
  #   paths:
  #     - 'crates/**'
  #     - 'Cargo.toml'
  #     - 'Cargo.lock'

# Annuler les runs précédents pour la même branche/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_VERSION: "1.83"
  # Skip Python detection for pyo3 - avoids environment contamination issues
  PYO3_NO_PYTHON: "1"

jobs:
  # ===========================================================================
  # Lint & Format (parallèle avec test et security)
  # ===========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          shared-key: "velesdb-ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (strict)
        run: |
          cargo clippy --workspace --all-targets --features persistence,gpu,update-check \
            --exclude velesdb-python \
            -- -D warnings -D clippy::pedantic

      - name: Run Clippy undocumented unsafe blocks (core)
        run: |
          cargo clippy -p velesdb-core --lib --bins \
            --features persistence,gpu,update-check \
            -- -A warnings -D clippy::undocumented_unsafe_blocks

      - name: Verify SAFETY template (production code)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          mapfile -t CORE_RS_FILES < <(
            git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
              | grep '\.rs$' \
              | grep '^crates/velesdb-core/src/' \
              | grep -v '/tests/' \
              | grep -v '/benches/' \
              | grep -Ev '_tests?\.rs$'
          )
          if [[ ${#CORE_RS_FILES[@]} -eq 0 ]]; then
            echo "No changed production Rust files to validate."
            exit 0
          fi
          python3 scripts/verify_unsafe_safety_template.py --files "${CORE_RS_FILES[@]}" --strict

      - name: Check TODO/FIXME/HACK governance (production code)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          mapfile -t CORE_RS_FILES < <(
            git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
              | grep '\.rs$' \
              | grep '^crates/velesdb-core/src/' \
              | grep -v '/tests/' \
              | grep -v '/benches/' \
              | grep -Ev '_tests?\.rs$'
          )
          if [[ ${#CORE_RS_FILES[@]} -eq 0 ]]; then
            echo "No changed production Rust files to validate."
            exit 0
          fi
          python3 scripts/check-todo-annotations.py --files "${CORE_RS_FILES[@]}"

      - name: Check for .unwrap() in production code
        run: python3 scripts/check_prod_unwraps.py

      - name: Audit feature claims vs exports
        run: python3 scripts/check-feature-claims.py
        continue-on-error: true  # Advisory — does not block merge

      - name: Audit performance claims consistency
        run: python3 scripts/check-perf-claims.py --no-criterion
        continue-on-error: true  # Advisory — does not block merge

      - name: Check doctests compile
        run: |
          cargo test --doc --package velesdb-core
        continue-on-error: false  # EPIC-080: Doctests fixes completed

  # ===========================================================================
  # Tests unitaires (parallèle avec lint et security)
  # ===========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          shared-key: "velesdb-ci"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run tests
        run: |
          cargo test --workspace --features persistence,gpu,update-check \
            --exclude velesdb-python \
            -- --test-threads=1
        env:
          RUST_TEST_THREADS: 1

  # ===========================================================================
  # Security Audit (parallèle - outils pré-compilés)
  # ===========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run security audit
        run: cargo deny check advisories

  # ===========================================================================
  # NOTE: Miri & Loom moved to quality-deep.yml (weekly + manual)
  # This saves ~10-15 min of CI time per push
  # Run manually: Actions → Quality Deep → Run workflow
  # ===========================================================================

  # ===========================================================================
  # Python Integration Tests (uniquement si integrations/ modifié)
  # ===========================================================================
  python-integrations:
    name: Python Integrations
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install velesdb-common (local shared package)
        run: pip install -e integrations/common

      - name: Install & Test LlamaIndex integration
        run: |
          cd integrations/llamaindex
          pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-asyncio
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "Tests skipped"

  # ===========================================================================
  # Coverage (main seulement)
  # ===========================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          shared-key: "velesdb-ci"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report and enforce threshold
        run: |
          # Run tests with coverage instrumentation and emit lcov report.
          # Threshold is 70%: the gpu/update-check features add code paths that
          # are not exercisable in CI (no GPU hardware), lowering measured coverage
          # vs the local 82.30% badge which was measured without those features.
          cargo llvm-cov --features persistence,gpu,update-check --workspace \
            --exclude velesdb-python \
            --fail-under-lines 70 \
            --lcov --output-path lcov.info \
            -- --test-threads=1

      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        continue-on-error: true
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: lcov.info

      - name: Upload lcov for SonarCloud
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: lcov-report
          path: lcov.info
          retention-days: 1

  # ===========================================================================
  # VelesQL Conformance (cross-ecosystem contract checks)
  # ===========================================================================
  velesql-conformance:
    name: VelesQL Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdks/typescript/package-lock.json

      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          shared-key: "velesdb-ci"

      - name: Core parser conformance
        run: cargo test -p velesdb-core --test velesql_parser_conformance

      - name: CLI parser conformance
        run: cargo test -p velesdb-cli --test velesql_parser_conformance

      - name: WASM parser conformance
        run: cargo test -p velesdb-wasm --test velesql_parser_conformance

      - name: Server REST conformance
        run: cargo test -p velesdb-server --test velesql_conformance_tests

      - name: TypeScript SDK conformance
        working-directory: sdks/typescript
        run: |
          npm ci
          npm test -- velesql-contract-fixtures.test.ts

  # ===========================================================================
  # Performance Smoke Test (EPIC-026/US-002)
  # Blocking regression detection against baseline
  # ===========================================================================
  perf-smoke:
    name: Perf Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          shared-key: "velesdb-ci"

      - name: Run smoke benchmark
        run: |
          cargo bench -p velesdb-core --bench smoke_test -- --noplot

      - name: Export smoke benchmark results
        run: |
          python3 scripts/export_smoke_criterion.py

      - name: Compare with baseline
        run: |
          python3 scripts/compare_perf.py \
            --current benchmarks/results/latest.json \
            --baseline benchmarks/baseline.json \
            --threshold 15

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: perf-smoke-results
          path: target/criterion/
          retention-days: 7

  # ===========================================================================
  # Benchmarks (main seulement - rapides uniquement)
  # ===========================================================================
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          shared-key: "velesdb-ci"

      - name: Run fast benchmarks only
        run: |
          cargo bench -p velesdb-core \
            --bench simd_benchmark \
            --bench filter_benchmark \
            -- --noplot

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 7

  # ===========================================================================
  # SonarCloud Analysis (quality gate for main/develop)
  # ===========================================================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [lint, test, security, coverage]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lcov-report
        continue-on-error: true

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@aecaf43ae57e412bd97d70ef9ce6076e672fe0a9 # v3.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ===========================================================================
  # Summary (léger)
  # ===========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, test, security, velesql-conformance, perf-smoke, sonarcloud]
    if: always()
    steps:
      - name: Check results
        run: |
          [[ "${{ needs.lint.result }}" == "success" ]] && \
          [[ "${{ needs.test.result }}" == "success" ]] && \
          [[ "${{ needs.velesql-conformance.result }}" == "success" ]] && \
          [[ "${{ needs.perf-smoke.result }}" == "success" ]] && \
          [[ "${{ needs.security.result }}" == "success" ]] && \
          echo "✅ CI passed" || { echo "❌ CI failed"; exit 1; }
