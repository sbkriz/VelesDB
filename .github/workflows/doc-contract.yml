name: Doc Contract

on:
  push:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'crates/velesdb-server/src/main.rs'
      - 'scripts/check-doc-contract.sh'
      - '.github/workflows/doc-contract.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'crates/velesdb-server/src/main.rs'
      - 'scripts/check-doc-contract.sh'
      - '.github/workflows/doc-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    name: README Runtime Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Check README/runtime contract
        run: bash scripts/check-doc-contract.sh
